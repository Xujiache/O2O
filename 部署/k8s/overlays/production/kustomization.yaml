apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: o2o-production

resources:
  - ../../base

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: backend
      spec:
        replicas: 4
        template:
          spec:
            containers:
              - name: backend
                resources:
                  requests:
                    cpu: 500m
                    memory: 512Mi
                  limits:
                    cpu: "2"
                    memory: 2Gi
    target:
      kind: Deployment
      name: backend
