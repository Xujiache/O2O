apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: o2o-production

resources:
  - ../../base

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: backend
      spec:
        replicas: 4
        template:
          spec:
            containers:
              - name: backend
                resources:
                  requests:
                    cpu: 500m
                    memory: 512Mi
                  limits:
                    cpu: "2"
                    memory: 2Gi
    target:
      kind: Deployment
      name: backend

  - patch: |-
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: o2o
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
      spec:
        tls:
          - hosts:
              - api.o2o.com
              - admin.o2o.com
            secretName: o2o-prod-tls
        rules:
          - host: api.o2o.com
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: backend
                      port:
                        number: 80
          - host: admin.o2o.com
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: admin-web
                      port:
                        number: 80
    target:
      kind: Ingress
      name: o2o
