# ============================================================================
# NetworkPolicy: 最小网络访问原则
# ============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-netpol
  namespace: o2o
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # 只允许 Ingress Controller 和 Prometheus 访问
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 3000
          protocol: TCP
  egress:
    # 允许访问同命名空间内依赖服务
    - to:
        - podSelector:
            matchLabels:
              app: mysql
      ports:
        - port: 3306
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: rabbitmq
      ports:
        - port: 5672
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: minio
      ports:
        - port: 9000
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: timescaledb
      ports:
        - port: 5432
          protocol: TCP
    # 允许 DNS 解析
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # 允许访问外部 HTTPS（高德 / 微信 / 支付宝）
    - to: []
      ports:
        - port: 443
          protocol: TCP
