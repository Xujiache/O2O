# ============================================================================
# O2O Admin Web Deployment
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-web
  namespace: o2o
  labels:
    app: admin-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: admin-web
  template:
    metadata:
      labels:
        app: admin-web
    spec:
      containers:
        - name: admin-web
          image: registry.example.com/o2o/admin:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: admin-web
  namespace: o2o
spec:
  type: ClusterIP
  selector:
    app: admin-web
  ports:
    - port: 80
      targetPort: 80
