apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: o2o
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: backend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: admin-web-pdb
  namespace: o2o
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: admin-web
