# ============================================================================
# O2O 管理后台 Nginx 配置（SPA）
# ============================================================================

server {
    listen 80;
    server_name admin.o2o.com;
    root /usr/share/nginx/html;
    index index.html;

    # ── 健康检查 ──
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
        access_log off;
    }

    # ── 静态资源缓存 ──
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA 路由兜底 ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 禁止访问隐藏文件 ──
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
