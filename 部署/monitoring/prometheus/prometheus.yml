# ============================================================================
# Prometheus 主配置
# ============================================================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # ── 后端 API ──
  - job_name: 'o2o-backend'
    metrics_path: '/metrics'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: ['o2o']
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        target_label: __address__
        regex: (.+)
        replacement: ${1}:$1

  # ── MySQL Exporter ──
  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql-exporter:9104']

  # ── Redis Exporter ──
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # ── RabbitMQ ──
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']

  # ── Node Exporter ──
  - job_name: 'node'
    kubernetes_sd_configs:
      - role: node
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
