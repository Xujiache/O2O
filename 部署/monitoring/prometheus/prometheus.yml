# ============================================================================
# Prometheus 主配置
# ============================================================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - 'rules/*.yml'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # ── 后端 API（按 Pod 注解发现，兼容 o2o / staging / production）──
  - job_name: 'o2o-backend'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: ['o2o', 'o2o-staging', 'o2o-production']
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: 'true'
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels:
          [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        target_label: __address__
        separator: ':'
        regex: (.+):(.+)
        replacement: $1:$2
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - source_labels: [__meta_kubernetes_pod_label_app]
        target_label: app

  # ── MySQL Exporter ──
  - job_name: 'mysql'
    kubernetes_sd_configs:
      - role: endpoints
        namespaces:
          names: ['o2o', 'o2o-staging', 'o2o-production']
    relabel_configs:
      - source_labels: [__meta_kubernetes_service_name]
        action: keep
        regex: mysql-exporter
      - source_labels:
          [__meta_kubernetes_endpoint_port_name, __meta_kubernetes_endpoint_port_number]
        action: keep
        regex: (.*;9104|.*9104)
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_service_name]
        target_label: service

  # ── Redis Exporter ──
  - job_name: 'redis'
    kubernetes_sd_configs:
      - role: endpoints
        namespaces:
          names: ['o2o', 'o2o-staging', 'o2o-production']
    relabel_configs:
      - source_labels: [__meta_kubernetes_service_name]
        action: keep
        regex: redis-exporter
      - source_labels:
          [__meta_kubernetes_endpoint_port_name, __meta_kubernetes_endpoint_port_number]
        action: keep
        regex: (.*;9121|.*9121)
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_service_name]
        target_label: service

  # ── RabbitMQ 管理端指标（需集群侧启用 prometheus 插件 / 15692 暴露）──
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']

  # ── Node Exporter ──
  - job_name: 'node'
    kubernetes_sd_configs:
      - role: endpoints
        namespaces:
          names: ['o2o', 'o2o-staging', 'o2o-production']
    relabel_configs:
      - source_labels: [__meta_kubernetes_service_name]
        action: keep
        regex: node-exporter
      - source_labels:
          [__meta_kubernetes_endpoint_port_name, __meta_kubernetes_endpoint_port_number]
        action: keep
        regex: (.*;9100|.*9100)
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_service_name]
        target_label: service
