# ============================================================================
# AlertManager 配置（P9 Sprint 4 W4.D.2）
#   - default → email-ops（P2）
#   - severity=P0 → 钉钉 + 企微 + 短信（p0-callduty）
#   - severity=P1 → 钉钉 + 企微（p1-channel）
#   - severity=P2 → 邮件（email-ops）
#   - inhibit_rules：基础设施告警（HighCpu/LowDisk）抑制业务告警（同 instance + 5min）
# 占位 webhook URL 由运维替换（标记 TODO）
# ============================================================================
global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'alert@o2o.local'
  smtp_auth_username: 'alert@o2o.local'
  smtp_auth_password: 'PLACEHOLDER' # TODO: 由运维替换为真实 SMTP 密码

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  group_by: ['alertname', 'severity', 'cluster']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'email-ops'
  routes:
    # ── P0：核心业务/支付/健康失败 → 钉钉 + 企微 + 短信 ──
    - matchers:
        - severity = "P0"
      receiver: 'p0-callduty'
      group_wait: 10s
      repeat_interval: 15m
      continue: false

    # ── P1：性能退化 / SLO 退化 → 钉钉 + 企微 ──
    - matchers:
        - severity = "P1"
      receiver: 'p1-channel'
      group_wait: 30s
      repeat_interval: 1h
      continue: false

    # ── P2：低优 → 邮件 ──
    - matchers:
        - severity = "P2"
      receiver: 'email-ops'
      repeat_interval: 4h
      continue: false

receivers:
  # ── 默认 / P2：邮件 ──
  - name: 'email-ops'
    email_configs:
      - to: 'ops@o2o.local'
        send_resolved: true
        headers:
          Subject: '[O2O][{{ .Status | toUpper }}][P2] {{ .CommonAnnotations.summary }}'

  # ── P1：钉钉 + 企微 ──
  - name: 'p1-channel'
    webhook_configs:
      # TODO 由运维替换 access_token：钉钉群机器人
      - url: 'https://oapi.dingtalk.com/robot/send?access_token=PLACEHOLDER'
        send_resolved: true
        max_alerts: 0
      # TODO 由运维替换 key：企业微信群机器人
      - url: 'https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=PLACEHOLDER'
        send_resolved: true
        max_alerts: 0

  # ── P0：钉钉 + 企微 + 短信 ──
  - name: 'p0-callduty'
    webhook_configs:
      # TODO 由运维替换 access_token：钉钉 P0 值班机器人
      - url: 'https://oapi.dingtalk.com/robot/send?access_token=PLACEHOLDER'
        send_resolved: true
        max_alerts: 0
      # TODO 由运维替换 key：企业微信 P0 值班机器人
      - url: 'https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=PLACEHOLDER'
        send_resolved: true
        max_alerts: 0
      # TODO 由运维替换 token：短信网关
      - url: 'https://sms-provider/api/send?token=PLACEHOLDER'
        send_resolved: true
        max_alerts: 0
        http_config:
          follow_redirects: true

inhibit_rules:
  # ── 基础设施告警抑制业务告警（同 instance，5min 窗口） ──
  - source_matchers:
      - alertname =~ "HighCpu|LowDisk"
    target_matchers:
      - alertname =~ "HighOrderCreateFailRate|HighPaymentFailRate|HighDispatchFailRate|HighRefundFailRate|HighHttp5xx|HighP95Latency"
    equal: ['instance']

  # ── P0 抑制同 alertname 的 P1（避免同一现象重复告警） ──
  - source_matchers:
      - severity = "P0"
    target_matchers:
      - severity = "P1"
    equal: ['alertname', 'cluster']
