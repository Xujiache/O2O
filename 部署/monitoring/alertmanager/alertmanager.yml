# ============================================================================
# AlertManager 配置
# ============================================================================
global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    # P0 — 核心服务下线 → 短信 + 电话
    - match:
        severity: critical
      receiver: 'critical-channel'
      repeat_interval: 15m

    # P1 — 性能退化 → 企业微信 + 短信
    - match:
        severity: warning
      receiver: 'warning-channel'
      repeat_interval: 1h

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://notify-service:8080/alerts'
        send_resolved: true

  - name: 'critical-channel'
    webhook_configs:
      # 企业微信群机器人
      - url: '${WECHAT_WEBHOOK_CRITICAL}'
        send_resolved: true
    # 短信网关（需对接 SMS API）
    # sms_configs:
    #   - api_url: 'https://sms.example.com/send'

  - name: 'warning-channel'
    webhook_configs:
      - url: '${WECHAT_WEBHOOK_WARNING}'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
