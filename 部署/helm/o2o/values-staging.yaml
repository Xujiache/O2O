# Staging 覆盖值
replicaCount:
  backend: 2
  adminWeb: 1

backend:
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    targetCPU: 80

ingress:
  hosts:
    api: staging-api.o2o.com
    admin: staging-admin.o2o.com
  tls:
    secretName: o2o-staging-tls
    issuer: letsencrypt-staging
