# ============================================================================
# Helm 模板 — Service
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: {{ .Release.Namespace }}
  labels:
    app: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.backend.port }}
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: admin-web
  namespace: {{ .Release.Namespace }}
  labels:
    app: admin-web
spec:
  type: ClusterIP
  selector:
    app: admin-web
  ports:
    - port: 80
      targetPort: 80
