# ============================================================================
# Helm 模板 — Service
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: {{ .Release.Namespace }}
  labels:
    app: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.backend.port }}
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-web
  namespace: {{ .Release.Namespace }}
  labels:
    app: admin-web
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  replicas: {{ .Values.replicaCount.adminWeb }}
  selector:
    matchLabels:
      app: admin-web
  template:
    metadata:
      labels:
        app: admin-web
    spec:
      containers:
        - name: admin-web
          image: "{{ .Values.image.registry }}/admin:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.adminWeb.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.adminWeb.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: admin-web
  namespace: {{ .Release.Namespace }}
  labels:
    app: admin-web
spec:
  type: ClusterIP
  selector:
    app: admin-web
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.adminWeb.port }}
      protocol: TCP
