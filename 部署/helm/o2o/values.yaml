# ============================================================================
# O2O Helm Chart — 默认 values
# ============================================================================

replicaCount:
  backend: 4
  adminWeb: 2

image:
  registry: registry.example.com/o2o
  tag: latest
  pullPolicy: Always

backend:
  port: 3000
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: '2'
      memory: 2Gi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 20
    targetCPU: 70
    targetMemory: 80

adminWeb:
  port: 80
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/proxy-body-size: '50m'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '120'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '120'
    nginx.ingress.kubernetes.io/limit-rps: '60'
  hosts:
    api: api.o2o.com
    admin: admin.o2o.com
  tls:
    secretName: o2o-tls
    issuer: letsencrypt-prod

env:
  nodeEnv: production
  appPrefix: /api/v1
  rabbitmqQueuePrefix: o2o
  minioUseSSL: false
  amapBaseUrl: https://restapi.amap.com

mysql:
  host: mysql
  port: 3306
  database: o2o_platform

redis:
  host: redis
  port: 6379

rabbitmq:
  host: rabbitmq
  port: 5672

minio:
  endpoint: minio
  port: 9000
  bucket: o2o-files

timescale:
  host: timescaledb
  port: 5432
  database: o2o_timescale

monitoring:
  enabled: true
  prometheus:
    scrape: true
    port: 3000
    path: /metrics
